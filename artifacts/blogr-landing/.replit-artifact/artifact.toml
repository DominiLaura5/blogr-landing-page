kind = "web"
previewPath = "/"
title = "Blogr Landing Page"
version = "1.0.0"
id = "artifacts/blogr-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24239

[services.development]
run = "pnpm --filter @workspace/blogr-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/blogr-landing", "run", "build" ]
publicDir = "artifacts/blogr-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24239"
BASE_PATH = "/"
